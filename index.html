<!DOCTYPE html>
<html>
<head>
    <style>
        .repo-section { margin: 30px 0; }
        .repo-list { list-style-type: none; padding: 0; }
        .repo-item { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 5px; }
        .repo-item a { text-decoration: none; color: #0366d6; }
        .repo-item.archived { opacity: 0.6; border-left: 3px solid #999; }
    </style>
</head>
<body>

<h1>Nuno Fidalgo</h1>

<p>I'm hosted with GitHub Pages.</p>

<p>
    Check out my website for more info: <br>    
    <a href="https://www.nunofidalgo.pt">www.nunofidalgo.pt</a> <br>
    <a href="https://www.nunofidalgo.com">www.nunofidalgo.com</a> <br>
    <a href="https://www.nunofidalgo.org">www.nunofidalgo.org</a> <br>
    <a href="https://www.nunofidalgo.net">www.nunofidalgo.net</a> <br>
</p>

<br>

<div class="repo-section">
    <h2>Active Projects</h2>
    <ul class="repo-list" id="active-repos">Loading...</ul>
</div>

<div class="repo-section">
    <h2>Archived Projects</h2>
    <ul class="repo-list" id="archived-repos">Loading...</ul>
</div>

<script>
async function loadRepos() {
    try {
        const response = await fetch('https://api.github.com/users/nunorfidalgo/repos?per_page=100&sort=updated');
        const repos = await response.json();

        const activeRepos = repos.filter(r => !r.archived);
        const archivedRepos = repos.filter(r => r.archived);

        displayRepos(activeRepos, 'active-repos');
        displayRepos(archivedRepos, 'archived-repos');
    } catch (error) {
        console.error('Error loading repos:', error);
    }
}

function displayRepos(repos, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';

    if (repos.length === 0) {
        container.innerHTML = '<li>No repositories</li>';
        return;
    }

    repos.forEach(repo => {
        const li = document.createElement('li');
        li.className = 'repo-item' + (repo.archived ? ' archived' : '');
        li.innerHTML = `<a href="${repo.html_url}">${repo.name}</a> - ${repo.description || 'No description'}`;
        container.appendChild(li);
    });
}

loadRepos();
</script>

</body>
</html>
